<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Showers CRM</title>
    <script>
      // GitHub Pages SPA redirect: restore the path that was encoded by 404.html
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?/ encoding from 404.html
        var l = window.location;
        if (l.search && l.search.slice(1, 3) === '?/') {
          history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              l.search.slice(2).replace(/&/, '?') +
              l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
