name: Deploy to pageson:
  push:
      branches:
            - main
            jobs:
              build:
                  runs-on: ubuntu-latest
                      steps:
                            - name: checkout        uses: actions/checkout@v4
                                  - name: Setup node        uses: actions/setup-node@v4
                                          with:
                                                    node-version: 18
                                                              cache: npm
                                                                    - run: npm ci
                                                                          - run: npm run build
                                                                                - uses: peaceiris/actions-gh-pages@v3
                                                                                        with:
                                                                                                  github_token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                            publish_dir: ./dist